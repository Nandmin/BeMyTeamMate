<footer class="py-4 relative overflow-hidden">
  <div class="absolute top-0 left-0 w-full h-[1px] bg-gradient-to-r from-transparent via-primary/50 to-transparent"></div>

  <div class="container mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
    <div class="flex flex-col md:flex-row justify-between items-center gap-8 mb-6">
      <div class="text-center md:text-left">
        <div class="flex items-center justify-center md:justify-start gap-2 mb-4">
          <img src="assets/images/headerIcon_1282.webp" alt="BeMyTeamMate Logo" style="width: 32px; height: 32px;" />
          <span class="text-white text-2xl font-black tracking-tighter footer-brand" style="font-family: 'Instrument Serif', 'serif'; font-weight: 600; font-style: normal;">BeMyTeamMate</span>
        </div>
        <p class="text-gray-400 max-w-sm text-sm font-medium">
          {{ 'common.footer.tagline' | transloco }}
        </p>
      </div>

      <div class="flex flex-wrap justify-center gap-8">
        <a routerLink="/privacy-policy" class="text-white hover:text-primary transition-all font-bold text-sm hover:scale-105 transform">
          {{ 'common.footer.privacyPolicy' | transloco }}
        </a>
        <a routerLink="/termofuse" class="text-white hover:text-primary transition-all font-bold text-sm hover:scale-105 transform">
          {{ 'common.footer.termsOfUse' | transloco }}
        </a>
        <a routerLink="/contact" class="text-white hover:text-primary transition-all font-bold text-sm hover:scale-105 transform">
          {{ 'common.nav.contact' | transloco }}
        </a>
        <a routerLink="/faq" class="text-white hover:text-primary transition-all font-bold text-sm hover:scale-105 transform">
          {{ 'common.nav.faq' | transloco }}
        </a>
      </div>
    </div>

    <div class="border-t border-white/5 pt-4 flex flex-col md:flex-row justify-center items-center gap-4">
      <p class="text-gray-500 text-xs text-center font-medium">
        {{ 'common.allRightsReserved' | transloco:{ year: currentYear } }}
      </p>
    </div>
  </div>
</footer>
