<div class="font-lexend bg-background-light dark:bg-background-dark text-white relative overflow-hidden flex flex-col min-h-full">
  <div class="fixed inset-0 z-0">
    <img
      alt="Night stadium background"
      class="h-full w-full object-cover opacity-20"
      src="https://lh3.googleusercontent.com/aida-public/AB6AXuBV8MAP5WlTqKL8RULkbECJpebqvKaH4n4vKWay4M7aT6_RC4BQOGOxVgDYtrz8CVXKqZJ3JyZNjskFxVmU52C6m3KIqKlN9PhqxJUBN0iimXXg3QlvradLplNrvYeYmuPEnXtdbJ0XnyNcs24qH3PHkATD1gsF4SjxFz_NoI4J0ffpAuIErH2RIrDGN1cP9Np_OMW6pJrHJ3QN4UyNl8Y-IaRD8dCfk1ECV5_kxz1QLEUg4uwL9vZ5yf1KZm972HhiZvtJ4Np8-qI"
    />
    <div class="absolute inset-0 bg-gradient-to-b from-background-dark/90 via-background-dark/80 to-background-dark/95"></div>
  </div>

  <div class="relative z-10 flex min-h-screen items-center justify-center p-4">
    <div class="w-full max-w-[520px] rounded-xl border border-border-dark bg-card-dark/60 p-6 shadow-2xl backdrop-blur-md">
      <div class="mb-5 text-center">
        <h1 class="text-[26px] font-bold tracking-tight">{{ 'resend.title' | t }}</h1>
        <p class="mt-2 text-sm text-gray-300">{{ 'resend.subtitle' | t }}</p>
      </div>

      @if (errorMessage) {
      <div class="whitespace-pre-line mb-4 rounded-lg border border-red-700 bg-red-600 p-4 text-center text-sm font-medium text-white">
        {{ errorMessage }}
      </div>
      }
      @if (successMessage()) {
      <div class="whitespace-pre-line mb-4 rounded-lg border border-green-700 bg-green-600 p-4 text-center text-sm font-medium text-white">
        {{ successMessage() }}
      </div>
      }

      <form class="flex flex-col gap-4" [formGroup]="resendForm" (ngSubmit)="onResendVerification()">
        <div class="group">
          <label class="block text-xs font-medium text-gray-200 mb-1.5 ml-1" for="email">{{ 'resend.emailLabel' | t }}</label>
          <div class="relative flex items-center">
            <span class="material-symbols-outlined absolute left-4 transition-colors group-focus-within:text-primary z-10 text-[20px]">mail</span>
            <input
              class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-white focus:outline-0 focus:ring-2 focus:ring-primary border border-border-dark bg-dark-accent/50 focus:border-transparent h-12 pl-[44px] pr-[15px] text-sm font-normal leading-normal transition-all shadow-sm"
              id="email"
              [placeholder]="'resend.emailPlaceholder' | t"
              type="email"
              formControlName="email"
            />
          </div>
        </div>

        <div class="group">
          <label class="block text-xs font-medium text-gray-200 mb-1.5 ml-1" for="password">{{ 'resend.passwordLabel' | t }}</label>
          <div class="relative flex items-center">
            <span class="material-symbols-outlined absolute left-4 transition-colors group-focus-within:text-primary z-10 text-[20px]">lock</span>
            <input
              class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-white focus:outline-0 focus:ring-2 focus:ring-primary border border-border-dark bg-dark-accent/50 focus:border-transparent h-12 pl-[44px] pr-[44px] text-sm font-normal leading-normal transition-all shadow-sm"
              id="password"
              [placeholder]="'resend.passwordPlaceholder' | t"
              [type]="showPassword() ? 'text' : 'password'"
              formControlName="password"
            />
            <button
              (click)="togglePassword()"
              class="absolute right-0 top-0 bottom-0 px-3 flex items-center justify-center hover:text-white transition-colors cursor-pointer outline-none focus:text-primary"
              type="button"
            >
              <span class="material-symbols-outlined text-[20px]">{{ showPassword() ? 'visibility_off' : 'visibility' }}</span>
            </button>
          </div>
        </div>

        <button
          [disabled]="isLoading()"
          class="group relative mt-2 flex w-full items-center justify-center overflow-hidden rounded-xl h-11 bg-primary text-white text-base font-bold leading-normal tracking-[0.015em] transition-all duration-300 hover:shadow-[0_0_20px_rgba(34,197,94,0.4)] hover:scale-[1.02] active:scale-[0.98] disabled:opacity-70 disabled:cursor-not-allowed"
          type="submit"
        >
          <span class="relative z-10 flex items-center gap-2">
            @if (isLoading()) {
            <span class="material-symbols-outlined animate-spin">progress_activity</span>
            {{ 'common.loading' | t }}
            } @else {
            {{ 'resend.submit' | t }}
            <span class="material-symbols-outlined text-[18px]">mail</span>
            }
          </span>
        </button>
      </form>

      <div class="mt-4 pt-4 border-t border-border-dark/50 text-center">
        <p class="text-gray-400 text-xs">
          <a class="text-white font-bold hover:text-primary transition-colors ml-1" routerLink="/login">
            {{ 'resend.backToLogin' | t }}
          </a>
        </p>
      </div>
    </div>

    <div class="mt-4 text-center text-[10px] font-light text-white/40">
      {{ 'common.allRightsReserved' | t:{ year: currentYear } }}
    </div>
  </div>
</div>
