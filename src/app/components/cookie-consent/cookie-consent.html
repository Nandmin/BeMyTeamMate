@if (showBanner()) {
  <div class="cookie-banner">
    <div class="cookie-content">
      <div class="cookie-icon">
        <span class="material-symbols-outlined">cookie</span>
      </div>
      <div class="cookie-text">
        <h3>{{ 'cookie.title' | t }}</h3>
        <p>
          {{ 'cookie.description' | t }}
          <br />
          {{ 'cookie.details.prefix' | t }}
          <a routerLink="/privacy-policy" class="privacy-link">{{ 'cookie.privacyPolicyLabel' | t }}</a>
          {{ 'cookie.details.middle' | t }}
          <a routerLink="/termofuse" class="privacy-link">{{ 'cookie.termsOfUseLabel' | t }}</a>
          {{ 'cookie.details.suffix' | t }}
        </p>
      </div>
      <div class="cookie-actions">
        <button class="btn-accept" (click)="accept()">
          <span class="material-symbols-outlined">check_circle</span>
          {{ 'cookie.accept' | t }}
        </button>
        <button class="btn-decline" (click)="decline()">
          <span class="material-symbols-outlined">cancel</span>
          {{ 'cookie.decline' | t }}
        </button>
      </div>
    </div>
  </div>
}
