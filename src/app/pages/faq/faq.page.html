<div class="min-h-[calc(100vh-4rem)] text-white relative overflow-hidden">
  <div class="fixed inset-0 z-0">
    <img
      alt="Soft focus stadium lights"
      class="h-full w-full object-cover opacity-15"
      src="https://lh3.googleusercontent.com/aida-public/AB6AXuB19b4mhq5e-7q4qaD9kuXU2BOpYQfZ0BK7knbf7ylfhyxYH0kyNXktA2e7rQd6b3hJz6WueQQzghAuwpQCoPKPbaZ2rJ8b9iKTkDBa_RH_A7d7s7z1PLZ8kJrLyviUcUOtdTURnP9I4nobEGayx5mqlOT1PhsT1wXj_Vf0bnwD4m4r1YuVgk5vEIS6t2kPjJ0rfr0iQv7G6Sxgduf3m0MOG6ehEtIMgrKZbGvlc0FZw8T9_Ba9rM0qg0C9N9Psw"
    />
    <div class="absolute inset-0 bg-gradient-to-b from-background-dark/95 via-background-dark/85 to-background-dark/95"></div>
    <div class="absolute -top-24 -left-24 h-[420px] w-[420px] rounded-full bg-primary/10 blur-[120px]"></div>
    <div class="absolute -bottom-16 -right-20 h-[360px] w-[360px] rounded-full bg-emerald-400/10 blur-[120px]"></div>
  </div>

  <section class="relative z-10 mx-auto w-full max-w-5xl px-4 sm:px-6 lg:px-8 py-12">
    <div class="text-center space-y-4 mb-10">
      <div
        class="inline-flex items-center gap-3 rounded-full border border-white/10 bg-white/5 px-4 py-1.5 text-xs uppercase tracking-[0.2em] text-white/70"
      >
        {{ 'faq.badge' | transloco }}
      </div>
      <h1 class="faq-title text-3xl sm:text-4xl lg:text-5xl font-black tracking-tight text-white">
        {{ 'faq.hero.title' | transloco }}
      </h1>
      <p class="text-base sm:text-lg text-white/70 max-w-2xl mx-auto">
        {{ 'faq.hero.description' | transloco }}
      </p>
    </div>

    <div class="space-y-4">
      @for (item of faqItems; track item.id; let index = $index) {
        <div class="faq-item group rounded-2xl border border-white/10 bg-white/5 p-5">
          <input class="faq-toggle" type="checkbox" [id]="'faq-item-' + index" />
          <label class="faq-summary" [for]="'faq-item-' + index">
            <span class="material-symbols-outlined text-primary">{{ item.icon }}</span>
            <span class="faq-question">{{ item.questionKey | transloco }}</span>
            <span class="material-symbols-outlined faq-icon">expand_more</span>
          </label>
          <div class="faq-answer whitespace-pre-line">
            {{ item.answerKey | transloco }}
            @if (item.linkKey) {
              <a class="faq-link inline-flex" routerLink="/contact">{{ item.linkKey | transloco }}</a>
            }
          </div>
        </div>
      }
    </div>
  </section>
</div>
